services:
  db:
    image: postgres:16-alpine
    container_name: teamsync-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-teamsync}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teamsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamsync-api
    restart: always
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-teamsync}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-super_secret_access_key_12345}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_12345}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js && node dist/src/main"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: teamsync-web
    restart: always
    ports:
      - "${WEB_PORT:-3001}:${WEB_PORT:-3001}"
    environment:
      PORT: ${WEB_PORT:-3001}
      BACKEND_URL: ${BACKEND_URL:-http://api:3000}
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:


